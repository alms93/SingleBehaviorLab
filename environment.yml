name: singlebehaviorlab
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - git
  - cudnn
  - pip:
    # GUI
    - PyQt6
    - PyQt6-WebEngine
    - PyYAML

    # Deep learning — PyTorch (CUDA 12.1; swap cu118 URL for CUDA 11.8)
    # These index-url flags are handled by install.sh; listed here for reference.
    - torch
    - torchvision

    # JAX (CUDA 12; handled by install.sh)
    - flax

    # Video backbone
    - videoprism @ git+https://github.com/google-deepmind/videoprism.git

    # SAM2 (local install handled by install.sh)

    # Vision / video
    - numpy
    - opencv-python
    - Pillow
    - scipy

    # Machine learning
    - scikit-learn
    - pandas

    # Clustering / dimensionality reduction
    - umap-learn
    - leidenalg
    - python-igraph
    - hdbscan

    # Visualization
    - plotly
    - matplotlib
